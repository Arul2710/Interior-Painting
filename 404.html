<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Wall Not Found | Interior Painting</title>
    <script src="tailwind.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        .paint-drip {
            width: 100px;
            height: 100px;
            background: #3B82F6;
            border-radius: 50%;
            position: absolute;
            filter: blur(2px);
            animation: drip 3s infinite ease-in-out;
        }
        @keyframes drip {
            0% { transform: translateY(-100px) scale(1); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(400px) scale(0.5); opacity: 0; }
        }
        .brush-stroke {
            font-family: 'Brush Script MT', cursive;
        }
    </style>
</head>
<body class="bg-slate-900 h-screen flex flex-col items-center justify-center overflow-hidden text-white">

    <div class="paint-drip left-[20%]" style="animation-delay: 0s; background-color: #3B82F6;"></div>
    <div class="paint-drip left-[50%]" style="animation-delay: 1s; background-color: #87A96B;"></div>
    <div class="paint-drip left-[80%]" style="animation-delay: 2s; background-color: #F5F5DC;"></div>

    <div class="z-10 text-center px-4">
        <h1 class="text-[150px] md:text-[200px] font-black leading-none animate__animated animate__bounceIn">
            4<span class="text-blue-500 underline decoration-wavy">0</span>4
        </h1>

        <h2 class="text-3xl md:text-4xl font-bold mb-4 animate__animated animate__fadeInUp">
            Oops! This wall hasn't been painted yet.
        </h2>
        
        <p class="text-slate-400 text-lg mb-8 max-w-md mx-auto animate__animated animate__fadeInUp" style="animation-delay: 0.5s;">
            Looks like our color consultants lost their way. The page you're looking for is either missing or still under the base coat.
        </p>

        <div class="flex flex-col sm:flex-row gap-4 justify-center animate__animated animate__fadeInUp" style="animation-delay: 0.8s;">
            <a href="index.html" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-full font-bold transition-all transform hover:scale-110">
                Back to Home
            </a>
            <a href="#" class="border border-slate-500 hover:border-white px-8 py-3 rounded-full font-bold transition-all">
                Contact Consultant
            </a>
        </div>
    </div>

    <div class="absolute bottom-10 right-10 opacity-20 animate__animated animate__slideInRight">
         <svg width="200" height="200" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="6" width="18" height="12" rx="2"/>
            <path d="M22 10v4"/>
            <path d="M2 12h18"/>
         </svg>
    </div>

</body>
</html>
